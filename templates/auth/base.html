<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}登录{% endblock %} - 考勤管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #165DFF 0%, #0A4BDB 100%); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.5s ease-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0A4BDB] via-[#165DFF] to-[#1D2129] p-4 font-sans">
    <div class="w-full max-w-[400px] fade-up">
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl card-shadow p-8">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium mb-3
                {% if category == 'success' %}bg-[#E8F8E0] text-[#52C41A]
                {% elif category == 'error' %}bg-[#FFF0F0] text-[#FF4D4F]
                {% elif category == 'warning' %}bg-[#FFF7E6] text-[#FAAD14]
                {% else %}bg-[#E6F7FF] text-[#165DFF]{% endif %}">
                <i class="fa {% if category == 'success' %}fa-check-circle{% elif category == 'error' %}fa-times-circle{% elif category == 'warning' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
