<div id="exportModal" class="modal-mask hidden">
    <div class="modal-content p-6">
        <form method="post" action="{{ export_url or request.path + '/export' }}">
            <div class="flex justify-between items-center mb-5">
                <h3 class="section-title"><i class="fa fa-download text-[#52C41A] mr-2"></i>导出数据</h3>
                <button type="button" onclick="closeExport()" class="text-[#C9CDD4] hover:text-[#4E5969]"><i class="fa fa-times text-lg"></i></button>
            </div>
            <p class="text-sm text-[#4E5969] mb-4">选择要导出的列：</p>
            <div class="grid grid-cols-2 gap-2 mb-4">
                {% for key, name in all_columns %}
                <label class="flex items-center gap-2 px-3 py-2 rounded-lg border border-[#E5E6EB] cursor-pointer hover:bg-[#F2F3F5] transition-colors">
                    <input class="accent-[#165DFF]" type="checkbox" name="columns" value="{{ key }}" id="col_{{ key }}" checked>
                    <span class="text-sm">{{ name }}</span>
                </label>
                {% endfor %}
            </div>
            <div class="flex gap-2 mb-5">
                <button type="button" class="btn-outline-sm" onclick="document.querySelectorAll('#exportModal input[name=columns]').forEach(c=>c.checked=true)">全选</button>
                <button type="button" class="btn-outline-sm" onclick="document.querySelectorAll('#exportModal input[name=columns]').forEach(c=>c.checked=false)">全不选</button>
            </div>
            {% if request.path.startswith('/attendance') or request.path.startswith('/statistics') %}
            <input type="hidden" name="month" value="{{ current_month }}">
            {% endif %}
            {% if request.path.startswith('/attendance') %}
            <input type="hidden" name="q" value="{{ query or '' }}">
            {% endif %}
            {% if request.path.startswith('/anomalies') %}
            <input type="hidden" name="filter" value="{{ filter or 'all' }}">
            {% endif %}
            <div class="flex justify-end gap-3">
                <button type="button" onclick="closeExport()" class="btn-outline">取消</button>
                <button type="submit" class="btn-success flex items-center gap-2"><i class="fa fa-download"></i> 导出 Excel</button>
            </div>
        </form>
    </div>
</div>
<script>
function closeExport() { document.getElementById('exportModal').classList.add('hidden'); }
document.querySelectorAll('[data-bs-target="#exportModal"]').forEach(btn => {
    btn.addEventListener('click', () => document.getElementById('exportModal').classList.remove('hidden'));
});
</script>
